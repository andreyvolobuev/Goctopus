run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosimple
    - gofmt

issues:
  exclude-rules:
    # Writing to an http.ResponseWriter rarely needs its error checked.
    - linters: [errcheck]
      source: "\\.Write\\(|WriteHeader\\(|Encode\\("
